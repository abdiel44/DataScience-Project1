experiment_name: sleep_edf_expanded_multitask_pretrain
random_seed: 42
train_csv: data/processed/sleep_edf_expanded_multitask.csv
cross_dataset: false
subject_column: subject_unit_id
recording_column: recording_id
task: multitask_apnea_stage

cv:
  n_splits: 5
  stratify: true
  shuffle: true

dataset:
  input_mode: epoch_store
  raw_root: Data-Set's
  epoch_store_root: data/processed/epoch_store/sleep_edf_expanded_multitask
  epoch_store_manifest: data/processed/sleep_edf_expanded_multitask_epoch_store.parquet
  order_column: epoch_index
  sequence_length: 9
  sample_hz: 100
  epoch_seconds: 30
  normalize_each_epoch: true
  max_recordings_in_memory: 4
  dataset_dirnames:
    sleep_edf_expanded: sleep-edf-database-expanded-1.0.0
  signal_channels:
    sleep_edf_expanded: EEG Fpz-Cz

labels:
  stage_order: [W, N1, N2, N3, REM]

model:
  type: conformer
  embedding_dim: 128
  conformer_blocks: 2
  attention_heads: 4
  ffn_dim: 256
  conv_kernel_size: 31
  dropout: 0.1

transfer:
  enabled: false

multitask:
  apnea_loss_weight: 1.0
  stage_loss_weight: 1.0

train:
  batching_strategy: recording_blocked
  subject_fraction: 1.0
  val_subject_fraction: 0.15
  epochs: 20
  batch_size: 8
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  log_every_batches: 100
  lr: 0.0001
  weight_decay: 0.01
  mixed_precision: true
  early_stopping_patience: 5

augmentations:
  enabled: true
  gaussian_noise_std: 0.01
  amplitude_scale_min: 0.9
  amplitude_scale_max: 1.1

device:
  preferred: cuda

output:
  root: reports/experiments
  save_models: true
  save_fold_models: true
  save_final_model: true
