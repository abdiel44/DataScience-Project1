# Cross-dataset (PRD E3): entrenar en corpus A, evaluar en B sin tunear hiperparámetros en B.
# Rellena train_csv y eval_csv; mismo esquema de features numéricas en ambos (mismos nombres de columnas).

experiment_name: cross_mitbih_train_shhs_eval
random_seed: 42

train_csv: data/processed/mitbih_sleep_stages.csv
eval_csv: data/processed/shhs_sleep_stages.csv

cross_dataset: true

subject_column: record_id
target_column: sleep_stage
task: multiclass

feature_exclude:
  - epoch_index
  - epoch_start_sample
  - epoch_end_sample
  - epoch_start_sec
  - epoch_end_sec
  - aux_raw

# Recomendado: misma lista de señales en A y B; con EEG monocanal usa feature_include idéntico.
feature_include: null

output:
  root: reports/experiments

models:
  svm_rbf: true
  random_forest: true
  xgboost: true

hyperparams:
  svm_rbf: { C: 1.0, gamma: scale }
  random_forest: { n_estimators: 200, max_depth: null, n_jobs: -1 }
  xgboost:
    n_estimators: 150
    max_depth: 4
    learning_rate: 0.1
    n_jobs: -1
    tree_method: hist
