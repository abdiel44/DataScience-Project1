experiment_name: sleep_edf_2013_fpzcz_deep_cnn
random_seed: 42
train_csv: data/processed/sleep_edf_2013_fpzcz_raw.csv
cross_dataset: false
subject_column: subject_id
recording_column: recording_id
target_column: sleep_stage
task: multiclass

cv:
  n_splits: 5
  stratify: true
  shuffle: true

dataset:
  raw_root: data/raw
  dataset_dirname: sleep-edf-database-expanded-1.0.0
  signal_channel: EEG Fpz-Cz
  order_column: epoch_index
  sequence_length: 9
  sample_hz: 100
  epoch_seconds: 30
  normalize_each_epoch: true
  max_recordings_in_memory: 16
  label_order: [W, N1, N2, N3, REM]

model:
  type: cnn
  embedding_dim: 128
  dropout: 0.1

ssl:
  enabled: false

train:
  subject_fraction: 1.0
  val_subject_fraction: 0.15
  epochs: 20
  batch_size: 32
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  lr: 0.0001
  weight_decay: 0.01
  mixed_precision: true
  early_stopping_patience: 5
  class_weight: balanced

augmentations:
  enabled: true
  gaussian_noise_std: 0.01
  amplitude_scale_min: 0.9
  amplitude_scale_max: 1.1
  time_mask_fraction: 0.05
  time_mask_count: 1
  frequency_dropout_fraction: 0.03
  frequency_dropout_prob: 0.2

device:
  preferred: cuda

output:
  root: reports/experiments
  save_models: true
  save_fold_models: true
  save_final_model: true
