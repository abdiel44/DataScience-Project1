# St. Vincent — una fila por ucddb*_stage.txt (resumen de hipnograma). PRD §4.1.

experiment_name: st_vincent_apnea
random_seed: 42
train_csv: data/processed/st_vincent_apnea.csv
cross_dataset: false
eval_csv: null

subject_column: recording_id
target_column: stage_mode
task: multiclass

feature_exclude: []

feature_include: null

cv:
  n_splits: 5
  stratify: true
  shuffle: true

output:
  root: reports/experiments

models:
  svm_rbf: true
  random_forest: true
  xgboost: true

hyperparams:
  svm_rbf: { C: 1.0, gamma: scale }
  random_forest: { n_estimators: 200, max_depth: null, n_jobs: -1 }
  xgboost:
    n_estimators: 150
    max_depth: 4
    learning_rate: 0.1
    n_jobs: -1
    tree_method: hist
