# Sleep-EDF Expanded — CSV propio (tras MNE u otra exportación). Ajustar train_csv y columnas.

experiment_name: sleep_edf_expanded
random_seed: 42
train_csv: data/processed/sleep_edf_my_export.csv
cross_dataset: false
eval_csv: null

subject_column: recording_id
target_column: sleep_stage
task: multiclass

feature_exclude:
  - subject_id

feature_include: null

cv:
  n_splits: 5
  stratify: true
  shuffle: true

output:
  root: reports/experiments

models:
  svm_rbf: true
  random_forest: true
  xgboost: true

hyperparams:
  svm_rbf: { C: 1.0, gamma: scale }
  random_forest: { n_estimators: 200, max_depth: null, n_jobs: -1 }
  xgboost:
    n_estimators: 150
    max_depth: 4
    learning_rate: 0.1
    n_jobs: -1
    tree_method: hist
