# MIT-BIH — filas con eventos respiratorios (event_tokens). PRD: apnea / eventos por ventana.

experiment_name: mitbih_respiratory_events
random_seed: 42
train_csv: data/processed/mitbih_respiratory_events.csv
cross_dataset: false
eval_csv: null

subject_column: record_id
target_column: event_tokens
task: multiclass

feature_exclude:
  - epoch_index
  - epoch_start_sample
  - epoch_end_sample
  - epoch_start_sec
  - epoch_end_sec
  - aux_raw
  - sleep_stage

feature_include: null

cv:
  n_splits: 5
  stratify: true
  shuffle: true

output:
  root: reports/experiments

models:
  svm_rbf: true
  random_forest: true
  xgboost: true

hyperparams:
  svm_rbf: { C: 1.0, gamma: scale }
  random_forest: { n_estimators: 200, max_depth: null, n_jobs: -1 }
  xgboost:
    n_estimators: 150
    max_depth: 4
    learning_rate: 0.1
    n_jobs: -1
    tree_method: hist
